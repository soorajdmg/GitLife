const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{

/* ─── DATA ─── */

  sam:    { id:'sam',    name:'Sam Rivera',   handle:'@sam.rivera',   ini:'SR', color:'oklch(60% 0.19 55)',  bio:'Optimist. Builder.',                      commits:22, branches:2,  followers:445,  following:67  },
  taylor: { id:'taylor', name:'Taylor Kim',   handle:'@taylor.kim',   ini:'TK', color:'oklch(52% 0.18 200)', bio:'Data scientist by day.',                  commits:56, branches:7,  followers:2100, following:311 },

  { id:'wi-phd',     name:'what-if/phd',         color:'oklch(56% 0.2 330)',  merged:true  },

const INIT_FEED = [

  { id:'c2', userId:'maya',   branch:'what-if/move-abroad',    message:'What if I moved to Lisbon for a year?',              body:'Remote-friendly company, lower cost of living, beautiful city. Running the numbers on a 12-month stint.', category:'Travel',        ts:'4h ago',  rx:{fork:88, merge:31, support:167}, ur:{}, wi:true,  img:'https://picsum.photos/seed/lisbon/600/280' },
  { id:'c3', userId:'sam',    branch:'main',                   message:'Started therapy — first session done',               body:null,                                                                                                    category:'Health',        ts:'6h ago',  rx:{fork:12, merge:89, support:412}, ur:{}, wi:false, img:null },

  { id:'c5', userId:'jordan', branch:'what-if/phd-cs',         message:'What if I went back for a PhD in CS?',               body:'Applied to 3 programs. Pros: research freedom. Cons: 5 years on a stipend.',                           category:'Education',     ts:'1d ago',  rx:{fork:54, merge:18, support:92 }, ur:{}, wi:true,  img:null },
  { id:'c6', userId:'maya',   branch:'main',                   message:'Moved in with partner after 2 years of dating',      body:null,                                                                                                    category:'Relationships', ts:'2d ago',  rx:{fork:23, merge:189,support:534}, ur:{}, wi:false, img:'https://picsum.photos/seed/home22/600/280' },
  { id:'c7', userId:'sam',    branch:'what-if/house-purchase', message:'What if I bought a house in the suburbs?',           body:'Rates are high, but renting feels like burning money. Ran the 5-year break-even calc.',                 category:'Housing',       ts:'3d ago',  rx:{fork:71, merge:44, support:98 }, ur:{}, wi:true,  img:'https://picsum.photos/seed/house9/600/280' },
  { id:'c8', userId:'taylor', branch:'what-if/career-switch',  message:'What if I switched to product management?',          body:'Have the technical skills. Not sure I want the politics. But the pay bump is real.',                    category:'Career',        ts:'3d ago',  rx:{fork:93, merge:37, support:141}, ur:{}, wi:true,  img:null },
];

const MY_TIMELINE = [
  { id:'m1', branch:'main',       message:'Joined Series A startup as lead engineer',  category:'Career',    date:'Apr 2026', wi:false, merged:false },
  { id:'m2', branch:'main',       message:'Relocated to San Francisco',                category:'Housing',   date:'Jan 2026', wi:false, merged:false },
  { id:'m3', branch:'wi-startup', message:'What if I co-founded my own startup?',      category:'Career',    date:'Jan 2026', wi:true,  merged:false },
  { id:'m4', branch:'main',       message:'Ran first marathon — finished in 3:47',     category:'Health',    date:'Oct 2025', wi:false, merged:false },
  { id:'m5', branch:'wi-phd',     message:'What if I pursued a CS PhD instead?',       category:'Education', date:'Sep 2025', wi:true,  merged:true  },
  { id:'m6', branch:'main',       message:'Left grad school, joined industry',          category:'Career',    date:'Jun 2025', wi:false, merged:false },
  { id:'m7', branch:'wi-nyc',     message:'What if I moved to New York instead?',      category:'Housing',   date:'Mar 2025', wi:true,  merged:false },
  { id:'m8', branch:'main',       message:'Started learning Japanese (N5 → N4)',       category:'Education', date:'Feb 2025', wi:false, merged:false },
  { id:'m9', branch:'main',       message:"Moved out of parents' home",                category:'Housing',   date:'Aug 2024', wi:false, merged:false },
];

/* ─── ACTIVITY DATA ─── */
const WEEK_DATA = [
  [0,1,0,2,0,1,0],[1,0,3,1,0,2,1],[0,2,1,0,1,0,2],[1,1,0,3,1,2,0],
  [0,0,2,1,0,1,0],[2,1,0,0,3,1,2],[0,1,1,2,0,0,1],[1,0,2,1,1,3,0],
  [0,2,0,1,0,1,0],[3,1,2,0,1,0,2],[1,0,1,2,0,3,1],[0,1,0,0,2,1,0],
  [2,0,3,1,0,2,0],[1,2,0,1,1,0,3],[0,1,2,0,1,2,1],[2,0,1,3,0,1,0],
  [1,1,0,2,1,0,2],[0,3,1,0,2,1,0],[1,0,2,1,0,3,2],[0,1,0,2,1,0,1],
];
const WEEK_MONTHS = ['Dec','Dec','Dec','Jan','Jan','Jan','Jan','Feb','Feb','Feb','Mar','Mar','Mar','Mar','Apr','Apr','Apr','Apr','Apr','Apr'];
const DAY_LABELS  = ['M','','W','','F','',''];
const CELL_COLORS = ['oklch(93% 0.04 260)','oklch(80% 0.1 260)','oklch(68% 0.15 260)','oklch(58% 0.18 260)','oklch(52% 0.2 260)'];
const totalCommits = WEEK_DATA.flat().reduce((a,b)=>a+b,0);
// Start date: 20 weeks back from Apr 23 2026 = Dec 10 2025
const GRAPH_START = new Date(2025, 11, 10);

/* ─── HELPERS ─── */
const fmt = n => n >= 1000 ? (n/1000).toFixed(1)+'k' : String(n);
const catColor = cat => {
  const h = {Career:'260',Health:'155',Relationships:'330',Finance:'60',Education:'200',Travel:'25',Housing:'80'}[cat]||'260';
  return { bg:`oklch(93% 0.04 ${h})`, fg:`oklch(40% 0.12 ${h})` };
};
const branchMeta = id => MY_BRANCHES.find(b=>b.id===id) || { color:'oklch(52% 0.2 260)', name:'main', merged:false };

const Avatar = ({ u, size=36 }) => (
  <div style={{width:size,height:size,borderRadius:'50%',background:u.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:size*0.3,fontWeight:700,color:'white',flexShrink:0,letterSpacing:'-0.5px'}}>
    {u.ini}
  </div>
);

const BranchPill = ({ name, wi, merged }) => {
  let bg,fg;
  if (merged)  { bg='oklch(92% 0.05 155)'; fg='oklch(38% 0.18 155)'; }
  else if (wi) { bg='oklch(93% 0.06 60)';  fg='oklch(45% 0.19 55)';  }
  else         { bg='oklch(93% 0.05 260)'; fg='oklch(42% 0.2 260)';  }
  return (
    <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 8px',borderRadius:5,fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:500,background:bg,color:fg,whiteSpace:'nowrap'}}>
      {merged?'✓':wi?'⎇':'●'} {name}
    </span>
  );
};

const Tag = ({ cat }) => {
  const c = catColor(cat);
  return <span style={{padding:'2px 8px',borderRadius:4,fontSize:11,fontWeight:500,background:c.bg,color:c.fg}}>{cat}</span>;
};

/* ─── COMMIT CARD ─── */
const CommitCard = ({ c, onReact, compact }) => {
  const user = USERS[c.userId];
  const [open, setOpen] = useState(false);
  const rxStyle = (type, active) => {
    const m = { fork:{b:'oklch(60% 0.19 55)',f:'oklch(45% 0.19 55)',bg:'oklch(96% 0.015 60)'}, merge:{b:'oklch(52% 0.2 260)',f:'oklch(42% 0.2 260)',bg:'oklch(95% 0.015 260)'}, support:{b:'oklch(50% 0.18 155)',f:'oklch(40% 0.18 155)',bg:'oklch(95% 0.015 155)'} }[type];
    return active ? {border:`1px solid ${m.b}`,color:m.f,background:m.bg} : {border:'1px solid oklch(90% 0.006 260)',color:'oklch(50% 0.01 260)',background:'white'};
  };
  return (
    <div onClick={()=>setOpen(!open)} style={{background:c.wi?'oklch(99.5% 0.012 65)':'white',border:`1px solid ${c.wi?'oklch(88% 0.1 60)':'oklch(91% 0.006 80)'}`,borderRadius:14,padding:compact?'14px 16px':'18px 20px',marginBottom:10,cursor:'pointer',transition:'box-shadow 0.15s'}}
      onMouseEnter={e=>e.currentTarget.style.boxShadow='0 2px 16px oklch(70% 0.01 260 / 0.1)'}
      onMouseLeave={e=>e.currentTarget.style.boxShadow='none'}>
      {c.wi && <div style={{display:'flex',alignItems:'center',gap:5,fontSize:12,color:'oklch(48% 0.19 55)',fontWeight:500,marginBottom:8}}>⎇ what-if branch</div>}
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
        <Avatar u={user} size={compact?32:36} />
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:14,fontWeight:600}}>{user.name}</div>
          <div style={{fontSize:12,color:'oklch(58% 0.01 260)',display:'flex',gap:6,alignItems:'center'}}>
            <span>{user.handle}</span><span>·</span><span>{c.ts}</span>
          </div>
        </div>
        <BranchPill name={c.branch} wi={c.wi} merged={false} />
      </div>
      <div style={{fontSize:15,fontWeight:600,lineHeight:1.4,marginBottom:c.body?6:10,color:c.wi?'oklch(42% 0.18 55)':'oklch(15% 0.015 260)'}}>{c.message}</div>
      {c.body && (open || c.body.length < 90) && <div style={{fontSize:13.5,color:'oklch(44% 0.01 260)',lineHeight:1.65,marginBottom:10}}>{c.body}</div>}
      {c.body && c.body.length >= 90 && !open && <div style={{fontSize:12,color:'oklch(52% 0.2 260)',marginBottom:8,marginTop:-2}}>Read more</div>}
      {c.img && <div style={{margin:'10px 0',borderRadius:10,overflow:'hidden',maxHeight:220}}>
        <img src={c.img} alt="" style={{width:'100%',objectFit:'cover',display:'block',maxHeight:220}} onError={e=>e.target.style.display='none'}/>
      </div>}
      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:12}}><Tag cat={c.category} /></div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingTop:10,borderTop:'1px solid oklch(95% 0.004 80)'}} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',gap:6}}>
          {[['⎇','fork'],['↩','merge'],['♡','support']].map(([icon,type]) => {
            const active = c.ur[type];
            return (
              <button key={type} onClick={()=>onReact(c.id,type)}
                style={{display:'flex',alignItems:'center',gap:5,padding:'5px 10px',borderRadius:8,fontSize:12,fontWeight:500,transition:'all 0.12s',...rxStyle(type,active)}}>
                {icon} {fmt(c.rx[type]+(active?1:0))}
              </button>
            );
          })}
        </div>
        <span style={{fontSize:11,color:'oklch(68% 0.006 260)'}}>{fmt(c.rx.fork+c.rx.merge+c.rx.support)} reactions</span>
      </div>
    </div>
  );
};

/* ─── FEED VIEW ─── */
const FeedView = ({ commits, onReact, onNew, compact }) => {
  const [filter, setFilter] = useState('All');
  const shown = filter === 'All' ? commits : commits.filter(c=>c.category===filter);
  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{background:'white',borderBottom:'1px solid oklch(91% 0.006 80)',padding:'12px 24px',flexShrink:0}}>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {['All',...CATEGORIES].map(f => (
            <button key={f} onClick={()=>setFilter(f)}
              style={{padding:'5px 13px',borderRadius:20,fontSize:12.5,fontWeight:500,border:`1px solid ${filter===f?'oklch(52% 0.2 260)':'oklch(88% 0.008 260)'}`,background:filter===f?'oklch(52% 0.2 260)':'white',color:filter===f?'white':'oklch(48% 0.01 260)',transition:'all 0.12s',cursor:'pointer'}}>
              {f}
            </button>
          ))}
        </div>
      </div>
      <div style={{flex:1,overflowY:'auto'}}>
        <div style={{maxWidth:620,margin:'0 auto',padding:'20px 0 80px'}}>
          {shown.map(c=><CommitCard key={c.id} c={c} onReact={onReact} compact={compact}/>)}
          {shown.length===0 && <div style={{textAlign:'center',padding:'60px 20px',color:'oklch(58% 0.01 260)',fontSize:14}}>Nothing here yet.</div>}
        </div>
      </div>
      <button onClick={onNew}
        style={{position:'fixed',bottom:28,right:28,background:'oklch(52% 0.2 260)',color:'white',border:'none',borderRadius:13,padding:'12px 22px',fontSize:14,fontWeight:600,display:'flex',alignItems:'center',gap:8,boxShadow:'0 4px 20px oklch(52% 0.2 260 / 0.35)',transition:'all 0.15s',cursor:'pointer'}}
        onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-1px)';e.currentTarget.style.boxShadow='0 6px 26px oklch(52% 0.2 260 / 0.42)';}}
        onMouseLeave={e=>{e.currentTarget.style.transform='translateY(0)';e.currentTarget.style.boxShadow='0 4px 20px oklch(52% 0.2 260 / 0.35)';}}>
        + New commit
      </button>
    </div>
  );
};

/* ─── TIMELINE: GIT GRAPH ─── */
const GitGraph = ({ commits }) => {
  const COL = { main:0, 'wi-startup':1, 'wi-phd':2, 'wi-nyc':3 };
  const COLORS = ['oklch(52% 0.2 260)','oklch(60% 0.19 55)','oklch(56% 0.2 330)','oklch(52% 0.18 200)'];
  const CW=22, RH=70;
  const svgW = CW*4+4;
  return (
    <div>
      {commits.map((c,i) => {
        const col = COL[c.branch]??1;
        const color = c.wi ? COLORS[col] : COLORS[0];
        const mainX=CW/2, cx=col*CW+CW/2, midY=RH/2;
        return (
          <div key={c.id} style={{display:'flex',alignItems:'stretch'}}>
            <svg width={svgW} height={RH} style={{flexShrink:0,display:'block'}}>
              <line x1={mainX} y1={0} x2={mainX} y2={RH} stroke="oklch(52% 0.2 260)" strokeWidth={2}/>
              {col>0 && <line x1={cx} y1={0} x2={cx} y2={RH} stroke={COLORS[col]} strokeWidth={1.5} strokeDasharray="5 3"/>}
              {col>0 && i>0 && COL[commits[i-1]?.branch]===0 && <path d={`M ${mainX} 0 C ${mainX} ${midY*0.6} ${cx} ${midY*0.4} ${cx} ${midY}`} fill="none" stroke={COLORS[col]} strokeWidth={1.5} strokeDasharray="5 3"/>}
              {c.merged && <path d={`M ${cx} ${midY} C ${cx} ${midY+14} ${mainX} ${RH-10} ${mainX} ${RH}`} fill="none" stroke="oklch(50% 0.18 155)" strokeWidth={1.5}/>}
              {c.wi ? <><circle cx={cx} cy={midY} r={6} fill="white" stroke={color} strokeWidth={2}/><circle cx={cx} cy={midY} r={2.5} fill={color}/></> : <circle cx={cx} cy={midY} r={6} fill={color} stroke="white" strokeWidth={2}/>}
            </svg>
            <div style={{flex:1,padding:`${(RH-52)/2}px 0 ${(RH-52)/2}px 14px`,borderBottom:i<commits.length-1?'1px solid oklch(96% 0.004 80)':'none',display:'flex',flexDirection:'column',justifyContent:'center',gap:3}}>
              <div style={{display:'flex',alignItems:'center',gap:7}}>
                <span style={{fontSize:13.5,fontWeight:600,lineHeight:1.35,color:c.wi?'oklch(45% 0.18 55)':'oklch(15% 0.015 260)'}}>{c.message}</span>
                {c.merged && <span style={{fontSize:10,padding:'1px 5px',background:'oklch(92% 0.05 155)',color:'oklch(38% 0.18 155)',borderRadius:4,fontWeight:600,flexShrink:0}}>merged</span>}
              </div>
              <div style={{display:'flex',gap:7,alignItems:'center'}}>
                <span style={{fontSize:11,color:'oklch(60% 0.008 260)',fontFamily:"'JetBrains Mono',monospace"}}>{c.date}</span>
                <Tag cat={c.category}/>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
};

/* ─── TIMELINE: COMMIT LOG ─── */
const CommitLog = ({ commits }) => (
  <div>
    {commits.map((c,i) => {
      const bm = branchMeta(c.branch);
      return (
        <div key={c.id} style={{display:'flex',gap:14,padding:'14px 0',borderBottom:i<commits.length-1?'1px solid oklch(96% 0.004 80)':'none'}}>
          <div style={{width:3,borderRadius:2,background:bm.color,flexShrink:0,alignSelf:'stretch',opacity:c.wi?0.6:1}}/>
          <div style={{flex:1}}>
            <div style={{display:'flex',gap:7,alignItems:'center',marginBottom:5}}>
              <BranchPill name={c.branch==='main'?'main':bm.name} wi={c.wi} merged={c.merged}/>
              {c.merged && <span style={{fontSize:10,padding:'1px 5px',background:'oklch(92% 0.05 155)',color:'oklch(38% 0.18 155)',borderRadius:4,fontWeight:600}}>merged</span>}
            </div>
            <div style={{fontSize:13.5,fontWeight:600,marginBottom:5,color:c.wi?'oklch(45% 0.18 55)':'oklch(15% 0.015 260)',lineHeight:1.35}}>{c.message}</div>
            <div style={{display:'flex',gap:7,alignItems:'center'}}>
              <span style={{fontSize:11,color:'oklch(60% 0.008 260)',fontFamily:"'JetBrains Mono',monospace"}}>{c.date}</span>
              <Tag cat={c.category}/>
            </div>
          </div>
        </div>
      );
    })}
  </div>
);

/* ─── TIMELINE: HORIZONTAL ─── */
const HorizTimeline = ({ commits }) => {
  const main = commits.filter(c=>c.branch==='main');
  const branches = commits.filter(c=>c.branch!=='main');
  const NW=190, totalW=Math.max(main.length*NW+60,700);
  return (
    <div style={{overflowX:'auto',paddingBottom:16}}>
      <div style={{width:totalW,position:'relative',height:240}}>
        <div style={{position:'absolute',top:80,left:40,width:totalW-60,height:2,background:'oklch(52% 0.2 260)',borderRadius:1}}/>
        {main.map((c,i) => {
          const x=40+i*NW;
          const forks = branches.filter(b=>{ const bi=commits.indexOf(b),ci=commits.indexOf(c),ni=commits.indexOf(main[i+1]); return bi>ci&&(ni===-1||bi<ni); });
          return (
            <div key={c.id} style={{position:'absolute',top:0,left:x}}>
              <div style={{position:'absolute',top:72,left:-7,width:16,height:16,borderRadius:'50%',background:'oklch(52% 0.2 260)',border:'3px solid white',boxShadow:'0 0 0 2px oklch(52% 0.2 260)'}}/>
              <div style={{position:'absolute',top:98,left:-NW/2+10,width:NW-20,textAlign:'center'}}>
                <div style={{fontSize:12,fontWeight:600,color:'oklch(15% 0.015 260)',lineHeight:1.35,marginBottom:3}}>{c.message}</div>
                <div style={{fontSize:10,color:'oklch(60% 0.008 260)',marginBottom:4,fontFamily:"'JetBrains Mono',monospace"}}>{c.date}</div>
                <Tag cat={c.category}/>
              </div>
              {forks.map((f,fi) => {
                const bm=branchMeta(f.branch);
                return (
                  <div key={f.id} style={{position:'absolute',top:80-(fi+1)*60-14,left:0}}>
                    <div style={{position:'absolute',bottom:14,left:0,width:NW*0.55,height:1.5,background:bm.color,opacity:0.7}}/>
                    <div style={{position:'absolute',bottom:6,left:0,width:13,height:13,borderRadius:'50%',background:'white',border:`2px solid ${bm.color}`}}>

/* ─── ACTIVITY GRAPH ─── */
const ActivityGraph = () => {
  const [hovered, setHovered] = useState(null);
  const CELL=10, GAP=2;

  const getDate = (week, day) => {
    const d = new Date(GRAPH_START);
    d.setDate(d.getDate() + week*7 + day);
    return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  };

  const monthLabels = [];
  WEEK_MONTHS.forEach((m,i) => {
    if (i===0 || m!==WEEK_MONTHS[i-1]) monthLabels.push({ week:i, label:m });
  });

  return (
    <div>
      <div style={{fontSize:10.5,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.08em',color:'oklch(58% 0.01 260)',marginBottom:10}}>Commit activity</div>
      <div style={{display:'flex',gap:8,marginBottom:12}}>
        {[[String(totalCommits),'commits'],['6wk','streak'],['Career','top area']].map(([val,lbl]) => (
          <div key={lbl} style={{flex:1,padding:'7px 8px',background:'oklch(97% 0.006 260)',borderRadius:8,textAlign:'center'}}>
            <div style={{fontSize:13,fontWeight:700,color:'oklch(25% 0.015 260)'}}>{val}</div>
            <div style={{fontSize:10,color:'oklch(58% 0.01 260)',marginTop:1}}>{lbl}</div>
          </div>
        ))}
      </div>
      <div style={{position:'relative'}}>
        <div style={{marginLeft:18,marginBottom:3,position:'relative',height:14}}>
          {monthLabels.map(({week,label}) => (
            <div key={week} style={{position:'absolute',left:week*(CELL+GAP),fontSize:9.5,fontWeight:600,color:'oklch(58% 0.01 260)',whiteSpace:'nowrap'}}>{label}</div>
          ))}
        </div>
        <div style={{display:'flex',gap:0}}>
          <div style={{display:'flex',flexDirection:'column',gap:GAP,marginRight:4,flexShrink:0}}>
            {DAY_LABELS.map((d,i) => <div key={i} style={{height:CELL,fontSize:9,color:'oklch(62% 0.01 260)',lineHeight:`${CELL}px`,textAlign:'right',width:14}}>{d}</div>)}
          </div>
          <div style={{display:'flex',gap:GAP}}>
            {WEEK_DATA.map((week,wi) => (
              <div key={wi} style={{display:'flex',flexDirection:'column',gap:GAP}}>
                {week.map((count,di) => {
                  const isHov = hovered?.week===wi && hovered?.day===di;
                  return (
                    <div key={di}
                      onMouseEnter={()=>setHovered({week:wi,day:di,count,date:getDate(wi,di)})}
                      onMouseLeave={()=>setHovered(null)}
                      style={{width:CELL,height:CELL,borderRadius:2,background:CELL_COLORS[count],transition:'transform 0.1s',transform:isHov?'scale(1.4)':'scale(1)',cursor:'default',position:'relative',zIndex:isHov?2:1}}
                    />
                  );
                })}
              </div>
            ))}
          </div>
        </div>
        {hovered && (
          <div style={{position:'absolute',bottom:-42,left:18,background:'oklch(18% 0.015 260)',color:'white',padding:'5px 10px',borderRadius:7,fontSize:11,fontWeight:500,whiteSpace:'nowrap',pointerEvents:'none',zIndex:10,lineHeight:1.6}}>
            <div style={{opacity:0.65,fontSize:10}}>{hovered.date}</div>
            <div>{hovered.count===0?'No commits':`${hovered.count} commit${hovered.count>1?'s':''}`}</div>
          </div>
        )}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:4,marginTop:16,justifyContent:'flex-end'}}>
        <span style={{fontSize:9.5,color:'oklch(62% 0.01 260)'}}>Less</span>
        {CELL_COLORS.map((bg,i) => <div key={i} style={{width:9,height:9,borderRadius:2,background:bg}}/>)}
        <span style={{fontSize:9.5,color:'oklch(62% 0.01 260)'}}>More</span>
      </div>
    </div>
  );
};

const MessagesView = () => {
  const [active, setActive] = useState('cv1');
  const [input, setInput]   = useState('');
  const [threads, setThreads] = useState(THREAD_MSGS);
  const bottomRef = useRef();
  const scrollRef = useRef();

  const convo = CONVOS.find(c=>c.id===active);
  const user  = convo ? USERS[convo.userId] : null;
  const msgs  = threads[active] || [];

  useEffect(() => {
    if (bottomRef.current) {
      bottomRef.current.scrollIntoView({ behavior:'smooth' });
    }
  }, [threads, active]);

  const send = () => {
    if (!input.trim()) return;
    const newMsg = { id:`msg_${Date.now()}`, from:'alex', text:input.trim(), ts:'just now' };
    setThreads(p=>({...p,[active]:[...(p[active]||[]),newMsg]}));
    setInput('');
  };

  return (
    <div style={{height:'100%',display:'flex',overflow:'hidden'}}>
      {/* Conversation list */}
      <div style={{width:280,flexShrink:0,borderRight:'1px solid oklch(91% 0.006 80)',overflowY:'auto',background:'white'}}>
        <div style={{padding:'16px 16px 10px',borderBottom:'1px solid oklch(94% 0.004 80)'}}>
          <div style={{fontSize:12,fontWeight:700,color:'oklch(32% 0.01 260)',marginBottom:10}}>Messages</div>
          <div style={{position:'relative'}}>
            <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',fontSize:13,color:'oklch(65% 0.01 260)'}}>⌕</span>
            <input placeholder="Search messages..." style={{width:'100%',padding:'7px 10px 7px 28px',borderRadius:8,border:'1px solid oklch(90% 0.008 260)',fontSize:12.5,fontFamily:"'Plus Jakarta Sans',sans-serif",outline:'none',background:'oklch(98.5% 0.005 80)'}}/>

        {CONVOS.map(cv => {
          const u = USERS[cv.userId];
          const isActive = cv.id === active;
          return (
            <div key={cv.id} onClick={()=>setActive(cv.id)}

              <div style={{position:'relative',flexShrink:0}}>
                <div style={{width:40,height:40,borderRadius:'50%',background:u.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,color:'white'}}>{u.ini}</div>
                {cv.unread>0 && <div style={{position:'absolute',top:-2,right:-2,width:16,height:16,borderRadius:'50%',background:'oklch(52% 0.2 260)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,color:'white',border:'2px solid white'}}>{cv.unread}</div>}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:2}}>
                  <span style={{fontSize:13,fontWeight:cv.unread?700:500,color:'oklch(18% 0.015 260)'}}>{u.name}</span>
                  <span style={{fontSize:10.5,color:'oklch(62% 0.01 260)',flexShrink:0}}>{cv.ts}</span>
                </div>
                <div style={{fontSize:12,color:'oklch(52% 0.01 260)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontWeight:cv.unread?500:400}}>{cv.lastMsg}</div>
              </div>
            </div>
          );
        })}
      </div>

      {/* Chat area */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {/* Header */}
        {user && (
          <div style={{flexShrink:0,padding:'14px 20px',borderBottom:'1px solid oklch(91% 0.006 80)',background:'white',display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:36,height:36,borderRadius:'50%',background:user.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:'white'}}>{user.ini}</div>

              <div style={{fontSize:14,fontWeight:600}}>{user.name}</div>
              <div style={{fontSize:11.5,color:'oklch(58% 0.01 260)',fontFamily:"'JetBrains Mono',monospace"}}>{user.handle}</div>
            </div>
          </div>
        )}

        {/* Messages */}
        <div ref={scrollRef} style={{flex:1,overflowY:'auto',padding:'20px 24px',display:'flex',flexDirection:'column',gap:4}}>
          {(() => {
            // Group consecutive messages by sender+timestamp
            const groups = [];
            msgs.forEach(msg => {
              const last = groups[groups.length-1];
              if (last && last.from===msg.from && last.ts===msg.ts) {
                last.messages.push(msg);
              } else {
                groups.push({ from:msg.from, ts:msg.ts, messages:[msg] });
              }
            });
            return groups.map((g, gi) => {
              const isMe = g.from === 'alex';
              const sender = USERS[g.from];
              return (
                <div key={gi} style={{display:'flex',flexDirection:isMe?'row-reverse':'row',alignItems:'flex-end',gap:8,marginBottom:8}}>

                    {g.messages.map((msg,mi) => (
                      <div key={msg.id}>
                        {msg.sharedCommit && (
                          <div style={{background:'white',border:'1px solid oklch(88% 0.008 260)',borderRadius:10,padding:'10px 12px',marginBottom:4}}>
                            <div style={{fontSize:10,color:'oklch(58% 0.01 260)',marginBottom:4,display:'flex',alignItems:'center',gap:4}}><span>⎇</span> Shared commit</div>
                            <div style={{fontSize:12.5,fontWeight:600,marginBottom:4,color:'oklch(18% 0.015 260)'}}>{msg.sharedCommit.message}</div>
                            <BranchPill name={msg.sharedCommit.branch} wi={false} merged={false}/>
                          </div>
                        )}
                        <div style={{
                          padding:'9px 14px',
                          borderRadius: (() => {
                            const only = g.messages.length===1, first=mi===0, last=mi===g.messages.length-1;
                            if (only) return '14px';
                            if (isMe) {
                              if (first) return '14px 14px 4px 14px';
                              if (last)  return '14px 14px 14px 4px';
                              return '14px 14px 4px 4px';
                            } else {
                              if (first) return '14px 14px 14px 4px';
                              if (last)  return '4px 14px 14px 14px';
                              return '4px 14px 14px 4px';
                            }
                          })(),
                          background:isMe?'oklch(52% 0.2 260)':'white',
                          color:isMe?'white':'oklch(18% 0.015 260)',
                          fontSize:13.5, lineHeight:1.5,
                          border:isMe?'none':'1px solid oklch(91% 0.006 80)',
                          boxShadow:'0 1px 4px oklch(70% 0.01 260 / 0.06)',
                        }}>{msg.text}</div>
                      </div>
                    ))}
                    {/* Single timestamp for the whole group */}
                    <div style={{fontSize:10.5,color:'oklch(65% 0.01 260)',marginTop:2,textAlign:isMe?'right':'left'}}>{g.ts}</div>
                  </div>
                </div>
              );
            });
          })()}
          <div ref={bottomRef}/>
        </div>

        {/* Input */}
        <div style={{flexShrink:0,padding:'14px 20px',borderTop:'1px solid oklch(91% 0.006 80)',background:'white',display:'flex',gap:10,alignItems:'flex-end'}}>
          <div style={{flex:1,border:'1px solid oklch(88% 0.008 260)',borderRadius:12,padding:'10px 14px',display:'flex',alignItems:'center',gap:10,background:'oklch(98.5% 0.005 80)'}}>
            <input value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&send()}
              placeholder="Send a message..."
              style={{flex:1,border:'none',background:'none',outline:'none',fontSize:13.5,fontFamily:"'Plus Jakarta Sans',sans-serif",color:'oklch(18% 0.015 260)'}}/>
            <button style={{border:'none',background:'none',cursor:'pointer',fontSize:16,color:'oklch(65% 0.01 260)',padding:0}}>📎</button>
          </div>
          <button onClick={send}
            style={{width:40,height:40,borderRadius:11,border:'none',background:'oklch(52% 0.2 260)',color:'white',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0,fontSize:16}}>
            ↑
          </button>
        </div>
      </div>
    </div>
  );
};

  { id:'n7', type:'follow',  userId:'sam',    message:'started following you', commit:null,                                        ts:'1d ago',  unread:false },
  { id:'n8', type:'merge',   userId:'priya',  message:'merged your decision', commit:'Started learning Japanese (N5 → N4)',       ts:'1d ago',  unread:false },
  { id:'n9', type:'fork',    userId:'sofia',  message:'forked your what-if',  commit:'What if I moved to New York instead?',      ts:'2d ago',  unread:false },
];

const NotificationsView = () => {
  const [notifs, setNotifs] = useState(NOTIF_DATA);
  const unreadCount = notifs.filter(n=>n.unread).length;

  const markAllRead = () => setNotifs(p=>p.map(n=>({...n,unread:false})));

  const typeIcon = type => ({ fork:'⎇', merge:'↩', support:'♡', follow:'👤' }[type]||'●');
  const typeBg   = type => ({ fork:'oklch(93% 0.06 60)', merge:'oklch(93% 0.05 260)', support:'oklch(93% 0.05 155)', follow:'oklch(93% 0.05 330)' }[type]||'oklch(93% 0.05 260)');
  const typeFg   = type => ({ fork:'oklch(45% 0.19 55)', merge:'oklch(42% 0.2 260)',  support:'oklch(40% 0.18 155)', follow:'oklch(42% 0.18 330)' }[type]||'oklch(42% 0.2 260)');

  return (
    <div style={{height:'100%',overflowY:'auto'}}>
      <div style={{maxWidth:620,margin:'0 auto',padding:'24px 0 60px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16,padding:'0 2px'}}>
          <div style={{fontSize:13,fontWeight:600,color:'oklch(45% 0.01 260)'}}>
            {unreadCount>0 ? `${unreadCount} unread` : 'All caught up'}
          </div>
          {unreadCount>0 && (
            <button onClick={markAllRead} style={{fontSize:12.5,fontWeight:500,color:'oklch(42% 0.2 260)',background:'none',border:'none',cursor:'pointer',padding:0}}>Mark all read</button>
          )}
        </div>

        {notifs.map(n => {
          const u = ALL_USERS[n.userId];
          return (
            <div key={n.id} onClick={()=>setNotifs(p=>p.map(x=>x.id===n.id?{...x,unread:false}:x))}
              style={{display:'flex',alignItems:'flex-start',gap:12,padding:'14px 16px',background:n.unread?'oklch(96.5% 0.012 260)':'white',border:`1px solid ${n.unread?'oklch(89% 0.04 260)':'oklch(92% 0.006 80)'}`,borderRadius:13,marginBottom:8,cursor:'pointer',transition:'background 0.15s'}}
              onMouseEnter={e=>e.currentTarget.style.background=n.unread?'oklch(95% 0.018 260)':'oklch(98.5% 0.005 80)'}
              onMouseLeave={e=>e.currentTarget.style.background=n.unread?'oklch(96.5% 0.012 260)':'white'}>
              {/* Avatar + type icon */}
              <div style={{position:'relative',flexShrink:0}}>
                <div style={{width:40,height:40,borderRadius:'50%',background:u.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,color:'white'}}>{u.ini}</div>
                <div style={{position:'absolute',bottom:-2,right:-2,width:18,height:18,borderRadius:'50%',background:typeBg(n.type),border:'2px solid white',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,color:typeFg(n.type)}}>{typeIcon(n.type)}</div>
              </div>
              {/* Content */}
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13.5,lineHeight:1.45,marginBottom:n.commit?5:0}}>
                  <span style={{fontWeight:700}}>{u.name}</span>
                  <span style={{color:'oklch(44% 0.01 260)'}}> {n.message}</span>
                </div>
                {n.commit && (
                  <div style={{fontSize:12,color:'oklch(48% 0.01 260)',background:'oklch(96% 0.006 80)',borderRadius:7,padding:'4px 9px',display:'inline-block',marginBottom:4,maxWidth:'100%',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                    "{n.commit}"
                  </div>
                )}
                <div style={{fontSize:11,color:'oklch(62% 0.01 260)',marginTop:3}}>{n.ts}</div>
              </div>
              {n.unread && <div style={{width:8,height:8,borderRadius:'50%',background:'oklch(52% 0.2 260)',flexShrink:0,marginTop:4}}/>}
            </div>
          );
        })}
      </div>
    </div>
  );
};

/* ─── TWEAKS PANEL ─── */
const TweaksPanel = ({ visible, tweaks, setTweaks }) => {
  if (!visible) return null;
  const set = (k,v) => { const n={...tweaks,[k]:v}; setTweaks(n); window.parent.postMessage({type:'__edit_mode_set_keys',edits:{[k]:v}},'*'); };
  return (
    <div style={{position:'fixed',bottom:80,right:24,background:'white',borderRadius:14,padding:'18px',boxShadow:'0 8px 40px oklch(30% 0.05 260 / 0.14)',border:'1px solid oklch(91% 0.006 80)',width:230,zIndex:50}}>
      <div style={{fontSize:12,fontWeight:700,marginBottom:14,color:'oklch(32% 0.01 260)'}}>Tweaks</div>
      {[
        { label:'Timeline view', key:'timelineViz', opts:[['graph','Git Graph'],['log','Commit Log'],['horizontal','Timeline']] },
        { label:'Density',       key:'density',     opts:[['comfortable','Comfortable'],['compact','Compact']] },
      ].map(g => (
        <div key={g.key} style={{marginBottom:14}}>
          <div style={{fontSize:10,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.08em',color:'oklch(60% 0.01 260)',marginBottom:6}}>{g.label}</div>
          <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
            {g.opts.map(([val,lbl]) => (
              <button key={val} onClick={()=>set(g.key,val)} style={{padding:'4px 10px',borderRadius:6,fontSize:11.5,cursor:'pointer',border:`1px solid ${tweaks[g.key]===val?'oklch(52% 0.2 260)':'oklch(88% 0.008 260)'}`,background:tweaks[g.key]===val?'oklch(52% 0.2 260)':'white',color:tweaks[g.key]===val?'white':'oklch(48% 0.01 260)',transition:'all 0.12s'}}>{lbl}</button>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
};

/* ─── NAV ICONS ─── */
const NAV_ICONS = {
  feed: (a) => (
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke={a?'oklch(42% 0.2 260)':'oklch(55% 0.01 260)'} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
      <circle cx="4" cy="4" r="1.2" fill={a?'oklch(42% 0.2 260)':'oklch(55% 0.01 260)'} stroke="none"/><line x1="7.5" y1="4" x2="13" y2="4"/>
      <circle cx="4" cy="8" r="1.2" fill={a?'oklch(42% 0.2 260)':'oklch(55% 0.01 260)'} stroke="none"/><line x1="7.5" y1="8" x2="13" y2="8"/>
      <circle cx="4" cy="12" r="1.2" fill={a?'oklch(42% 0.2 260)':'oklch(55% 0.01 260)'} stroke="none"/><line x1="7.5" y1="12" x2="13" y2="12"/>
    </svg>
  ),
  explore: (a) => (
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke={a?'oklch(42% 0.2 260)':'oklch(55% 0.01 260)'} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
      <circle cx="8" cy="8" r="6"/>
      <polygon points="10.5,5.5 6,7 5.5,10.5 10,9" fill={a?'oklch(42% 0.2 260)':'oklch(55% 0.01 260)'} stroke="none"/>
    </svg>
  ),
  profile: (a) => (
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke={a?'oklch(42% 0.2 260)':'oklch(55% 0.01 260)'} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
      <circle cx="8" cy="5.5" r="2.5"/>
      <path d="M2.5 13.5c0-3 2.5-4.5 5.5-4.5s5.5 1.5 5.5 4.5"/>
    </svg>
  ),
  messages: (a) => (
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke={a?'oklch(42% 0.2 260)':'oklch(55% 0.01 260)'} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
      <path d="M2 3.5C2 2.7 2.7 2 3.5 2h9C13.3 2 14 2.7 14 3.5v6c0 .8-.7 1.5-1.5 1.5H9l-3 2.5V11H3.5C2.7 11 2 10.3 2 9.5v-6z"/>
      <line x1="5" y1="5.5" x2="11" y2="5.5"/><line x1="5" y1="8" x2="8.5" y2="8"/>
    </svg>
  ),
  branches: (a) => (
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke={a?'oklch(42% 0.2 260)':'oklch(55% 0.01 260)'} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
      <circle cx="5" cy="3.5" r="1.5"/><circle cx="5" cy="12.5" r="1.5"/><circle cx="11" cy="6.5" r="1.5"/>
      <line x1="5" y1="5" x2="5" y2="11"/><path d="M5 5c0 0 0-1.5 6 0"/>
    </svg>
  ),
  notifications: (a) => (
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke={a?'oklch(42% 0.2 260)':'oklch(55% 0.01 260)'} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
      <path d="M8 2a4.5 4.5 0 0 1 4.5 4.5c0 2.5.8 3.5 1.5 4H2c.7-.5 1.5-1.5 1.5-4A4.5 4.5 0 0 1 8 2z"/>
      <path d="M6.5 13.5a1.5 1.5 0 0 0 3 0"/>
    </svg>
  ),
};
const NAV = [{ id:'feed', label:'Feed' },{ id:'explore', label:'Explore' },{ id:'profile', label:'My Life' },{ id:'messages', label:'Messages' },{ id:'notifications', label:'Notifications' }];

/* ─── APP ─── */
function App() {
  const [view, setView]         = useState(()=>localStorage.getItem('gl_view')||'feed');
  const [commits, setCommits]   = useState(INIT_FEED);
  const [modal, setModal]       = useState(false);
  const [tweaksVis, setTweaksVis] = useState(false);
  const [tweaks, setTweaks]     = useState(TWEAK_DEFAULTS);

  useEffect(() => {
    const h = e => {
      if (e.data?.type==='__activate_edit_mode')   setTweaksVis(true);
      if (e.data?.type==='__deactivate_edit_mode') setTweaksVis(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return () => window.removeEventListener('message', h);
  }, []);

  useEffect(()=>{ localStorage.setItem('gl_view',view); },[view]);

  const react = (id,type) => setCommits(prev=>prev.map(c=>c.id!==id?c:{...c,ur:{...c.ur,[type]:!c.ur[type]}}));
  const addCommit = data => { setCommits(prev=>[{id:`c_${Date.now()}`,userId:'alex',branch:data.branch,message:data.message,body:data.body,category:data.category,ts:'just now',rx:{fork:0,merge:0,support:0},ur:{},wi:data.wi},...prev]); setView('feed'); };
  const compact = tweaks.density==='compact';

  return (
    <div style={{display:'flex',height:'100vh',background:'oklch(98.5% 0.005 80)'}}>
      <aside style={{width:230,flexShrink:0,background:'white',borderRight:'1px solid oklch(91% 0.006 80)',display:'flex',flexDirection:'column',padding:'18px 14px'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'4px 8px 20px',fontSize:17,fontWeight:700}}>
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect width="28" height="28" rx="8" fill="oklch(52% 0.2 260)"/>
            <line x1="10" y1="6" x2="10" y2="22" stroke="white" strokeWidth="2" strokeLinecap="round" opacity="0.5"/>
            <path d="M10 11 C10 11 10 8 18 8" stroke="white" strokeWidth="2" strokeLinecap="round" fill="none"/>
            <circle cx="10" cy="19" r="2.5" fill="white"/>
            <circle cx="10" cy="11" r="2.5" fill="white"/>
            <circle cx="18" cy="8" r="2.5" fill="white" opacity="0.7"/>
          </svg>
          GitLife
        </div>

        {NAV.map(item => (
          <button key={item.id} onClick={()=>setView(item.id)}
            style={{display:'flex',alignItems:'center',gap:10,padding:'8px 10px',borderRadius:8,fontSize:13.5,fontWeight:view===item.id?600:500,color:view===item.id?'oklch(42% 0.2 260)':'oklch(48% 0.01 260)',background:view===item.id?'oklch(94% 0.015 260)':'transparent',border:'none',cursor:'pointer',marginBottom:1,transition:'all 0.12s',textAlign:'left'}}>
            <span style={{width:18,display:'flex',alignItems:'center',justifyContent:'center'}}>{NAV_ICONS[item.id](view===item.id)}</span>
            {item.label}
          </button>
        ))}

        <div style={{marginTop:24}}>
          <div style={{fontSize:10,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.09em',color:'oklch(60% 0.01 260)',padding:'0 10px',marginBottom:7}}>Following</div>
          {Object.values(USERS).filter(u=>u.id!=='alex').slice(0,4).map(u => (
            <button key={u.id} style={{display:'flex',alignItems:'center',gap:9,padding:'7px 10px',borderRadius:8,border:'none',background:'transparent',cursor:'pointer',width:'100%',transition:'background 0.12s'}}
              onMouseEnter={e=>e.currentTarget.style.background='oklch(96% 0.008 80)'}
              onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <div style={{width:24,height:24,borderRadius:'50%',background:u.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,color:'white',flexShrink:0}}>{u.ini}</div>
              <div style={{fontSize:12.5,fontWeight:500,color:'oklch(28% 0.01 260)',textAlign:'left'}}>{u.name}</div>
            </button>
          ))}
        </div>

        <div style={{marginTop:'auto',paddingTop:14,borderTop:'1px solid oklch(91% 0.006 80)'}}>
          <button onClick={()=>setView('profile')}
            style={{display:'flex',alignItems:'center',gap:10,padding:'8px',borderRadius:9,border:'none',background:'transparent',cursor:'pointer',width:'100%',transition:'background 0.12s'}}
            onMouseEnter={e=>e.currentTarget.style.background='oklch(96% 0.008 80)'}
            onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            <div style={{width:32,height:32,borderRadius:'50%',background:ME.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:'white',flexShrink:0}}>{ME.ini}</div>
            <div style={{textAlign:'left'}}>
              <div style={{fontSize:13,fontWeight:600}}>{ME.name}</div>
              <div style={{fontSize:11,color:'oklch(58% 0.01 260)',fontFamily:"'JetBrains Mono',monospace"}}>{ME.handle}</div>
            </div>
          </button>
        </div>
      </aside>

      <main style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{height:52,flexShrink:0,background:'white',borderBottom:'1px solid oklch(91% 0.006 80)',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 22px'}}>
          <div style={{fontSize:15,fontWeight:700}}>{{feed:'Feed',explore:'Explore',profile:'My Life',messages:'Messages',branches:'Branches',settings:'Settings'}[view]}</div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <div style={{width:32,height:32,borderRadius:8,background:'oklch(96% 0.008 80)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'oklch(48% 0.01 260)'}}>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><circle cx="7" cy="7" r="4.5"/><line x1="10.5" y1="10.5" x2="13.5" y2="13.5"/></svg>
            </div>
            <div style={{width:32,height:32,borderRadius:8,background:'oklch(96% 0.008 80)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'oklch(48% 0.01 260)'}}>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M8 2a4.5 4.5 0 0 1 4.5 4.5c0 2.5.8 3.5 1.5 4H2c.7-.5 1.5-1.5 1.5-4A4.5 4.5 0 0 1 8 2z"/><path d="M6.5 13.5a1.5 1.5 0 0 0 3 0"/></svg>
            </div>
          </div>
        </div>

        <div style={{flex:1,overflow:'hidden'}}>
          {view==='feed'     && <FeedView commits={commits} onReact={react} onNew={()=>setModal(true)} compact={compact}/>}
          {view==='explore'  && <ExploreView/>}
          {view==='profile'  && <ProfileView viz={tweaks.timelineViz}/>}
          {view==='messages' && <MessagesView/>}
          {view==='settings' && <SettingsView/>}
          {view==='branches' && (
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:10,color:'oklch(60% 0.01 260)'}}>
              <div style={{fontSize:36}}>⎇</div>
              <div style={{fontSize:14,fontWeight:600}}>Coming soon</div>
              <div style={{fontSize:12.5}}>This section is in development</div>
            </div>
          )}
        </div>
      </main>

      {modal && <NewCommitModal onClose={()=>setModal(false)} onSubmit={addCommit}/>}
      <TweaksPanel visible={tweaksVis} tweaks={tweaks} setTweaks={setTweaks}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
